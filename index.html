<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>AI Tracker</title>
    <style>
      body {
        background: #1a1a2e;
        color: #eee;
        font-family: sans-serif;
        padding: 20px;
      }
      #grid {
        display: block;
        width: 120px;
        margin-top: 12px;
        background: #0a0a1e;
        border-collapse: collapse;
        font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
        font-size: 14px;
      }
      #grid td {
        padding: 2px 10px;
        border: 1px solid #222244;
        white-space: pre;
      }
      #grid tr.current {
        background: #3a3a6e;
        color: #fff;
      }
      #grid td.row-num {
        color: #888;
      }
    </style>
  </head>
  <body>
    <button id="play">Play</button>
    <table id="grid"></table>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
